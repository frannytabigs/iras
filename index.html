<script>
const urlParams = new URLSearchParams( window.location.search);
const customLocation = urlParams.get('customLocation');
const startDate = urlParams.get('startDate');
const endDate = urlParams.get('endDate');
const date = urlParams.get('date');
const dateSelect = document.getElementById('date-select');
const locationSelect = document.getElementById('location-select');
const startDateElement = document.getElementById('startDate');
const endDateElement = document.getElementById('endDate');
const customLocationElement = document.getElementById('customLocation');

if (customLocation){
    locationSelect.insertBefore(new Option(customLocation, customLocation), locationSelect.firstChild);
    locationSelect.value = customLocation;
}
if (date){
    dateSelect.value = date;
}

if (startDate && endDate){
    handleFilterChange("date");
    startDateElement.required = true;
    endDateElement.required = true;
    startDateElement.name = "startDate";
    endDateElement.name = "endDate";
    startDateElement.value = startDate;
    endDateElement.value = endDate;
    startDateElement.blur();    
}



     function handleFilterChange(type) {
                if (type === 'location') {
                    var select = document.getElementById('location-select');
                    var customInput = document.getElementById('custom-location-input');

                    if (select.value === 'Custom Location') {
                        customInput.classList.remove('hidden');
                        customLocationElement.focus();
                        customLocationElement.required = true;
                        customLocationElement.name = "customLocation";
                    } else {
                        customInput.classList.add('hidden');
                        customLocationElement.required = false;
                        customLocationElement.name = "";                        
                    }
                } else if (type === 'date') {
                    var select = document.getElementById('date-select');
                    var customInput = document.getElementById('custom-date-inputs');

                    if (select.value === 'Custom Date') {
                        customInput.classList.remove('hidden');
                        startDateElement.focus();
                        startDateElement.required = true;
                        endDateElement.required = true;
                        startDateElement.name = "startDate";
                        endDateElement.name = "endDate";
                    } else {
                        customInput.classList.add('hidden');
                        startDateElement.required = false;
                        endDateElement.required = false;
                        startDateElement.name = "";
                        endDateElement.name = "";
                    }
                }
            }
</script>

        <script>

            function initializeMap(mapId) {
                var mapElement = document.getElementById(mapId);
                var map = L.map(mapId).setView([10.3233, 123.9411], 14); 

                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                }).addTo(map);
                
                L.marker([10.3233, 123.9411]).addTo(map).bindPopup('Theft at Skwelahan ni Diana (High Priority)').openPopup();
                L.marker([10.3462, 123.9603]).addTo(map).bindPopup('Traffic Accident at Tabigshet (Resolved)');

        <script type="text/javascript">
            google.charts.load('current', {'packages':['corechart']});
            google.charts.setOnLoadCallback(drawCharts);

            function drawCharts() {
                
                var pieData = google.visualization.arrayToDataTable([
                    ['Incident Type', 'Number of Incidents'],
                    ['Theft', 45],
                    ['Assault', 30],
                    ['Accident', 25],
                    ['Robbery', 15],
                    ['Fire', 5],
                    ['Other', 10]
                ]);

                var pieOptions = {
                    title: 'Incident Types Distribution',
                    pieHole: 0.4,
                    colors: ['#4f46e5', '#ef4444', '#f59e0b', '#10b981', '#a855f7', '#06b6d4'],
                    legend: { position: 'right', alignment: 'center' }, 
                    chartArea: {width: '80%', height: '75%'},
                    fontName: 'Inter',
                    titleTextStyle: { fontSize: 16 }
                };

                var pieChart = new google.visualization.PieChart(document.getElementById('pie_chart'));
                pieChart.draw(pieData, pieOptions);

                var columnData = google.visualization.arrayToDataTable([
                    ['Day', 'Incidents'],
                    ['Mon', 12],
                    ['Tue', 20],
                    ['Wed', 18],
                    ['Thu', 25],
                    ['Fri', 30],
                    ['Sat', 15],
                    ['Sun', 10]
                ]);

                var columnOptions = {
                    title: 'Daily Incident Reports',
                    legend: { position: 'none' },
                    chartArea: {width: '90%', height: '75%'},
                    hAxis: { title: 'Day of the Week' },
                    vAxis: { title: 'Number of Reports', minValue: 0 },
                    colors: ['#4f46e5'], 
                    fontName: 'Inter',
                    titleTextStyle: { fontSize: 16 }
                };

                var columnChart = new google.visualization.ColumnChart(document.getElementById('column_chart'));

                var lineData = google.visualization.arrayToDataTable([
                    ['Month', 'Total Incidents'],

                    ['May', 190],

                    ['Jul', 250],
                    ['Aug', 220],
                    ['Sep', 260],
                    ['Oct', 280],
                    ['Nov', 310],
                    ['Dec', 350]
                ]);

                var lineOptions = {

                    hAxis: { title: 'Month' },
                    vAxis: { title: 'Total Incidents', minValue: 0 },
