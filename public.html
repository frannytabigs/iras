<style>
:root{
    --fontColor: #333;
    --headerColor: #1e2939;
    --headerFontColor: white;
    --secondaryColor: rgb(117, 189, 116);
    --tertiaryColor: #141a21;
    --bgBody: #f3f4f6;          
    --fontColor: #1f2937;       
    --primaryColor: #4f46e5;    
    --cardBg: #ffffff;
    --border: #e5e7eb;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

*{
    scroll-behavior: smooth;
}
body {
    font-family: 'Inter', sans-serif; 
    background-color: var(--bgBody); 
    color: var(--fontColor); 
    margin: 0; padding: 0;
    line-height: 1.5;
}

main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 25px;
    display: flex;
    flex-direction: column;
    gap: 25px;
    min-height: 100vh;
}

section, .piechart-wrapper, .linechart-wrapper, .barchart-wrapper {
    background-color: var(--cardBg);
    border-radius: 12px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--border);
    overflow: hidden;
}

.mapped {
    display: grid;
    grid-template-columns: 350px 1fr;
    gap: 20px;
    height: 700px; 
    order: 2;
}

.map {
    height: 100%; width: 100%;
    position: relative; z-index: 0;
}
#map { height: 100%; width: 100%; }

.charts {
    display: flex;
    flex-direction: column;
    gap: 15px;
    height: 100%;
    overflow: hidden;
}

.chart-header-date {
    background-color: var(--secondaryColor);
    color: black;
    padding: 10px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    font-size: 0.9rem;
    box-shadow: var(--shadow-sm);
}

.pieline {
    display: flex;
    gap: 15px;
    height: 45%;
}

.bar {
    height: 55%;
}

.piechart-wrapper, .linechart-wrapper, .barchart-wrapper {
    overflow: auto; 
    position: relative;
    height: 100%; width: 100%;
}
.piechart-wrapper { flex: 1; }
.linechart-wrapper { flex: 2; }

.chart-scroll-content { height: 100%; }
#piechart { min-width: 320px; }
#linechart { min-width: 550px; }
#barchart { min-width: 800px; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
::-webkit-scrollbar-thumb { background: #c7c7c7; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

.filter { order: 1; }
.section-title { order: 3; font-weight: 700; color: #374151; margin: 10px 0 0 0; }
.reports-container { order: 4; }

@media (max-width: 900px) {
    main { display: flex; flex-direction: column; }
    
    .mapped { display: contents; }

    .filter { order: 1; }
    .charts { 
        order: 2; 
        height: auto; 
        overflow: visible; 
    }
    .section-title { order: 3; }
    .reports-container { order: 5; }
    .map { 
        order: 4; 
        height: 400px; 
        min-height: 400px; 
        margin-top: 20px;
    }

    .pieline { flex-direction: column; height: auto; }
    .piechart-wrapper, .linechart-wrapper, .barchart-wrapper { height: 300px; }
}

footer { text-align: center; padding: 20px; color: #6b7280; font-size: 0.85rem; }

.deletereport{
    border-radius: 8px;
    background-color: #ef4444;
    color: white;
    border-color: white;
    padding:10px; 
    transition: all 0.3s ease;
    margin: 10px;
    margin-bottom: 0;
}
.deletereport:hover{
    transform: scale(1.5);
    box-shadow: var(--shadow-md);
}



@keyframes rainbow-flow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.colorrainbow {
    border: 2px solid transparent; 
    
    outline: none;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);

    background-image: 
        linear-gradient(var(--secondaryColor), var(--secondaryColor)), 
        linear-gradient(90deg, 
            #ff0000, #ff7f00, #ffff00, #00ff00, 
            #0000ff, #4b0082, #9400d3, #ff0000); 

    background-origin: border-box;
    background-clip: padding-box, border-box;
    background-size: 200% 200%;
    animation: rainbow-flow 10s linear infinite;
}

.highlight-anim {
  animation: flash-highlight 2s ease-out;
}

@keyframes flash-highlight {
  0% {
    transform: scale(1.2); 
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    border-color: red;
    border-width: 20px;
  }
  100% {
    transform: scale(1);
    box-shadow: none;
    border-color: transparent;
  }
}

#scrollToTopBtn {
  position: fixed; 
  bottom: 20px;
  right: 20px;
  z-index: 1000; 
  padding: 10px 15px;
  background-color: #007bff; 
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s, visibility 0.3s;
}

#scrollToTopBtn:hover {
  background-color: #0056b3;
}

#scrollToTopBtn.showBtn {
  opacity: 1;
  visibility: visible;
}


div.google-visualization-tooltip {
    pointer-events: none !important;
    z-index: 9999 !important;
}

div.google-visualization-tooltip > ul, 
div.google-visualization-tooltip > li,
div.google-visualization-tooltip span {
    pointer-events: none !important;
}
.filter {
    background: white;
    padding: 15px;
    border-radius: 12px;
}

#form {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: flex-end;
    width: 100%;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 150px;
}

label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    color: #6b7280;
}

select, input[type="text"], input[type="date"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 0.9rem;
    background-color: #f9fafb;
    color: #111827;
    box-sizing: border-box; 
}

select:focus, input:focus {
    border-color: var(--primaryColor);
    background-color: white;
    outline: 2px solid #e0e7ff;
}

input[type="submit"] {
    background-color: var(--primaryColor);
    color: white;
    font-weight: 600;
    border: none;
    padding: 0 25px;
    height: 42px; 
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.2s;
    white-space: nowrap;
    background-color: #4338ca;
}

input[type="submit"]:hover {
    background-color: #4338ca;
    transform: translateY(-1px);
}

.hidden {
    display: none !important;
}
header{
    position: sticky;
    top: 0;
    z-index:1000;
}
nav{
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--headerFontColor);
    background-color: var(--headerColor);
    padding:0px 20px 0 20px;
}
.image{
    width: 45px;
    height:45px;  
    display: flex; 
    justify-content: center;
    align-items: center;
    text-align: center;
    border-radius: 50%; 
    object-fit: cover;
    cursor: pointer;
    border: 0;
    vertical-align: middle;
}
.brand, .navigation{
    display: flex;
    align-items: center;
    gap:10px;
}
.navigation{
    gap:50px;
}
.user,.menus{
    display:flex;
    color:var(--headerFontColor);
    align-items: center;
    flex-direction: column;
    background-color: var(--tertiaryColor);
    padding: 20px;
    gap: 6px;
    text-align: center;
    display: none;
    transition: all 1s ease;
}
@media (min-width: 700px){
    #menu,.user,.menus{    
        display:none;
    }
    .user{
        float:right;
        border-radius: 8px;
        margin: 1px 5px;
        padding:10px;
        width: 100px;
        position: absolute;
        right: 0; 
    }
    .user::before {
        content: ''; 
        position: absolute;
        top: -10px; 
        left: 60%; 
        transform: translateX(-50%); 
        border-left: 10px solid transparent; 
        border-right: 10px solid transparent; 
        border-bottom: 10px solid var(--tertiaryColor); 
        transform: scale(3.5);    
    }
  

}
@media (max-width: 700px){
    nav a{    
        display:none;
    }
}
.navigation .image{
    box-shadow: 0 0 0 3px var(--secondaryColor);
    transition: all 0.2s linear;
}
.navigation .image:hover {
    box-shadow: 0 0 0 6px var(--secondaryColor);
}
#menu{
    transition: all 0.2s linear;
}
#menu:hover{
    background-color:  var(--tertiaryColor);
    border-radius: 8px;
}

header a{
    transition: all 0.3s linear;
}
header a:hover{
    background-color: var(--secondaryColor);
    border-radius: 8px;
    padding:10px;
    cursor: pointer;
    z-index:3;
}
#preloader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: var(--bgBody);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: all 1.5s ease; 
}

.loader-content {
    text-align: center;
    color: var(--fontColor);
}

.loader-content h2 {
    margin: 0 0 10px 0;
    color: var(--primaryColor);
}

.spinner {
    width: 40px;
    height: 40px;
    margin: 20px auto;
    border: 4px solid #e5e7eb;
    border-top: 4px solid var(--primaryColor);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.loaded {
    opacity: 0;
    visibility: hidden;
    display:none;
}
.custom-pin {
    width: 32px; 
    height: 32px;
    border-radius: 50% 50% 50% 0; 
    background: #444; 
    position: absolute;
    transform: rotate(-45deg); 
    display: flex; 
    align-items: center; 
    justify-content: center;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    border: 2px solid white;
    transition: transform 0.2s;
}

.custom-pin:hover {
    transform: rotate(-45deg) scale(1.1);
    z-index: 1000 !important;
}

.custom-pin i {
    width: 10px;
    height: 10px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 50%; 
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg); 
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
}


.pin-fire { background: #EF4444; }       
.pin-assault { background: #991B1B; }    
.pin-accident { background: #F59E0B; }  
.pin-theft { background: #8B5CF6; }      
.pin-flooding { background: #3B82F6; }  
.pin-vandalism { background: #10B981; }  
.pin-harassment { background: #EC4899; }

.pin-waste { background: #0891B2; }      
.reports-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 25px;
    padding: 0 20px;
} 

.report-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;

    box-shadow: var(--shadow-sm);
    transition: all 0.3s ease;

    flex-direction: column;

}

.report-card:hover {
    transform: translateY(-4px);

    border-color: #d1d5db;
}

.card-image {
    height: 180px;
    width: 100%;

    background-color: #f3f4f6;
}

.card-image img {
    width: 100%;
    height: 100%;

}


.badge {
    position: absolute;

    color: white;
    font-size: 0.7rem;

    border-radius: 4px;
    text-transform: uppercase;

}

.type-fire { background-color: #EF4444; }

.type-vandalism { background-color: #10B981; }
.type-harassment { background-color: #EC4899; }
.type-suspicious { background-color: #6366F1; }
.type-other { background-color: #9CA3AF; }
.type-road { background-color: #4B5563; }
.type-stray { background-color: #B45309; }
.type-waste { background-color: #0891B2; }

.card-content {

}

.meta-header {
    display: flex;

}

.incident-id {

.incident-date {

.description {

    flex-grow: 1;
}

.location-box {
    background: #f9fafb;

    border-radius: 6px;

    gap: 8px;
    align-items: flex-start;
}

.address {
    font-size: 0.85rem;
    font-weight: 600;
    color: #111827;
}

.coords {
    font-size: 0.7rem;

}

.reporter-info {
    border-top: 1px solid #f3f4f6;

    gap: 10px;
}

.avatar {
    width: 32px;

    border-radius: 50%;
        object-fit: cover; 
}

.reporter-name {
    font-size: 0.85rem;
    color: #4b5563;
}

  0% {
    transform: rotateY(0deg);
  }
  100% {
    transform: rotateY(360deg);
  }
}

.statusdeleted {
    opacity:0.3;border-color:red;animation: flipY 10s linear infinite;
}

</style>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
    /**
     * CRITICAL IOS 12 FIX: Safe Date Parsing
     * Safari (iOS 12) rejects 'YYYY-MM-DD', insists on 'YYYY/MM/DD'.
     */
    function safeDate(timestamp) {
        if (!timestamp) return new Date();
        if (typeof timestamp === 'number') return new Date(timestamp);
        if (typeof timestamp === 'string') {
            // Replace dashes with slashes for Safari compatibility
            var safeStr = timestamp.replace(/-/g, "/");
            return new Date(safeStr);
        }
        return new Date(timestamp);
    }

    function drawDailyBarChart(monthKey, incidents) {
        if(!monthKey) return;
        
        const parts = monthKey.split('-');
        const yearStr = parts[0];
        const monthStr = parts[1];
        
        const dateObj = new Date(yearStr, monthStr - 1, 1);
        const monthName = dateObj.toLocaleDateString('en-US', { month: 'long' });
        const fullDateLabel = dateObj.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        
        const filteredData = incidents.filter(function(incident) {
            const date = safeDate(incident.occurredAt); // SAFE
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            return (year + '-' + month) === monthKey;
        });

        const daysInMonth = new Date(yearStr, monthStr, 0).getDate();
        const dailyCounts = {};

        for (let i = 1; i <= daysInMonth; i++) {
            dailyCounts[i] = 0;
        }

        filteredData.forEach(function(incident) {
            const date = safeDate(incident.occurredAt); // SAFE
            const day = date.getDate();
            dailyCounts[day]++;
        });

        const dataTable = new google.visualization.DataTable();
        dataTable.addColumn('string', 'Day');
        dataTable.addColumn('number', 'Incidents');

        for (let i = 1; i <= daysInMonth; i++) {
            dataTable.addRow([String(i), dailyCounts[i]]);
        }

        var safeTitle = (typeof title !== 'undefined') ? title : "";
        var safeLocTitle = (typeof loctitle !== 'undefined') ? loctitle : "";
        var formatter = new Intl.NumberFormat('en-US');

        const options = {
            title: 'Incidents of ' + fullDateLabel + ' ' + safeTitle + ' ' + safeLocTitle + ' (' + formatter.format(filteredData.length) + ' Reports)',  
            legend: { position: 'none' },
            tooltip: { isHtml: true },
            hAxis: { title: 'Day of ' + monthName },
            vAxis: { title: 'Number of Reports', minValue: 0, format: '0' },
            colors: ['#e67e22'],
            animation: { startup: true, duration: 1000, easing: 'out' },
            chartArea: {width: '85%', height: '70%'},
        };
        const chart = new google.visualization.ColumnChart(document.getElementById('barchart'));
        chart.draw(dataTable, options);
        
        google.visualization.events.addListener(chart, 'select', function() {
            var monthclass = 'month' + fullDateLabel.toLowerCase().substring(0,3);
            scrolltoelement(monthclass);
        }); 
    }

    const locselect = document.getElementById('location');
    const customLocGroup = document.getElementById('custom-loc-group');
    const customLocInput = document.getElementById('location_select');

    const dateRangeSelect = document.getElementById('daterange');
    const startDateGroup = document.getElementById('start-date-group');
    const endDateGroup = document.getElementById('end-date-group');
    const startDateInput = document.getElementById('startdate');
    const endDateInput = document.getElementById('enddate');

    locselect.addEventListener('change', function() {
        if (this.value === 'custom_location') {
            customLocGroup.classList.remove('hidden');
            customLocInput.required = true;
        } else {
            customLocGroup.classList.add('hidden');
            customLocInput.required = false;
            customLocInput.value = '';
        }
    });

    dateRangeSelect.addEventListener('change', function() {
        if (this.value === 'custom_date') {
            startDateGroup.classList.remove('hidden');
            endDateGroup.classList.remove('hidden');
            startDateInput.required = true;
            endDateInput.required = true;
        } else {
            startDateGroup.classList.add('hidden');
            endDateGroup.classList.add('hidden');
            startDateInput.required = false;
            endDateInput.required = false;
            startDateInput.value = '';
            endDateInput.value = '';
        }
    });

    const urlParams = new URLSearchParams(window.location.search);
    const customLocationVal = urlParams.get('location_select');
    const locationVal = urlParams.get('location');
    const startDateVal = urlParams.get('startdate');
    const endDateVal = urlParams.get('enddate');
    const dateRangeVal = urlParams.get('daterange');
    const typeVal = urlParams.get('type');
    
    const typeinput = document.getElementById('type');

    if (typeVal){ typeinput.value = typeVal; }
    if (locationVal) { locationSelect = document.getElementById('location'); locationSelect.value = locationVal; }
    if (customLocationVal && locselect.value === 'custom_location') {
        customLocInput.value = customLocationVal;
        customLocGroup.classList.remove('hidden');
    }
    if (dateRangeVal) { dateRangeSelect.value = dateRangeVal; }
    if (startDateVal && endDateVal && dateRangeSelect.value === 'custom_date') {
        startDateInput.value = startDateVal;
        endDateInput.value = endDateVal;
        startDateGroup.classList.remove('hidden');
        endDateGroup.classList.remove('hidden');
    }

    function deleteincident(id){
        var cardincident = document.getElementById(id);
        if(cardincident){
            cardincident.className += ' statusdeleted';
            var btn = cardincident.querySelector('button');
            if(btn) btn.innerHTML = "DELETED INCIDENT";
        }
    }

    function loadLineBarChart(incidents) {
        if(!incidents || incidents.length === 0) return;

        const monthlyCounts = {};

        incidents.forEach(function(incident) {
            const date = safeDate(incident.occurredAt); // SAFE
            const year = date.getFullYear(); 
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const monthKey = year + '-' + month; 
            
            // Safety check against invalid dates creating 'NaN-NaN'
            if (!isNaN(year)) {
                if (monthlyCounts[monthKey]) {
                    monthlyCounts[monthKey]++;
                } else {
                    monthlyCounts[monthKey] = 1;
                }
            }
        });

        const availableKeys = Object.keys(monthlyCounts).sort();
        if (availableKeys.length === 0) return;
        
        const startKey = availableKeys[0];
        const endKey = availableKeys[availableKeys.length - 1];

        // Safe Date Parsing for the loop logic
        let loopDate = new Date(startKey.replace(/-/g, "/") + "/01");
        const endDate = new Date(endKey.replace(/-/g, "/") + "/01");
        
        var tt = Object.keys(monthlyCounts).length > 12;
      
        const chartData = [['Month', 'Incidents']];
        const allMonthsFilled = []; 
        
        // Prevent infinite loops if dates are still weird
        let safetyCounter = 0;
        while (loopDate <= endDate && safetyCounter < 100) {
            const y = loopDate.getFullYear();
            const m = String(loopDate.getMonth() + 1).padStart(2, '0');
            const currentKey = y + '-' + m;
            const count = monthlyCounts[currentKey] || 0;

            let label = "";
            if (tt) {
                label = loopDate.toLocaleDateString('en-US', { month: 'short', year:'numeric'});
            } else {
                label = loopDate.toLocaleDateString('en-US', { month: 'short'});
            }

            chartData.push([label, count]);
            allMonthsFilled.push(currentKey);
            loopDate.setMonth(loopDate.getMonth() + 1);
            safetyCounter++;
        }

        const dataTable = google.visualization.arrayToDataTable(chartData);

        var sFirst = allMonthsFilled[0]; 
        var partsFirst = sFirst.split('-');
        var dateObjStart = new Date(partsFirst[0], partsFirst[1] - 1, 1);
        var yearstart = dateObjStart.toLocaleDateString('en-US', { year: 'numeric', month:'short' });

        var sLast = allMonthsFilled[allMonthsFilled.length - 1]; 
        var partsLast = sLast.split('-');
        var dateObjEnd = new Date(partsLast[0], partsLast[1] - 1, 1);
        var yearend = dateObjEnd.toLocaleDateString('en-US', { year: 'numeric', month:'short' });

        var safeTitle = (typeof title !== 'undefined') ? title : "";
        var safeLocTitle = (typeof loctitle !== 'undefined') ? loctitle : "";
        var formatter = new Intl.NumberFormat('en-US');

        const options = {
            title: 'Incident Reports ' + yearstart + ' to ' + yearend + " " + safeTitle + " " + safeLocTitle + " (" + formatter.format(incidents.length) + " Reports)",
            legend: { position: 'bottom' },
            tooltip: { isHtml: true },
            hAxis: { title: 'Month' },
            vAxis: { title: 'Number of Reports', minValue: 0 },
            pointSize: 5, 
            colors: ['#4f46e5'], 
            chartArea: { width: '85%', height: '70%' },
            backgroundColor: 'transparent',
            animation: { startup: true, duration: 1000, easing: 'out' }
        };

        const chart = new google.visualization.LineChart(document.getElementById('linechart'));
        chart.draw(dataTable, options);

        drawDailyBarChart(allMonthsFilled[allMonthsFilled.length - 1], incidents);

        google.visualization.events.addListener(chart, 'select', function() {
            const selection = chart.getSelection();
            if (selection.length > 0) {
                const row = selection[0].row;
                var selectedMonthKey = allMonthsFilled[row]; 
                drawDailyBarChart(selectedMonthKey, incidents);
                document.getElementById('barchart').scrollIntoView({behavior: 'smooth', block: 'nearest'});
            }
        }); 
    }

    const map = L.map("map").setView([10.3233, 123.9411], 14); 
    map.locate({ setView: true, maxZoom: 14});
    map.on('locationfound', function(e) {
        L.circleMarker(e.latlng).addTo(map).bindPopup("You are here").openPopup();
    });
    map.on('locationerror', function(e) {
        console.log("Location access denied.");
    });
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 14,
            attribution: '© <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    function loadMap(incidents) {
        incidents.forEach(function(incident) {
            const dateStr = prettyDateTimeManual(incident.occurredAt);
            const typeKey = incident.type.toLowerCase().split(' ')[0];
            const pinClass = 'pin-' + typeKey; 

            const customIcon = L.divIcon({
                className: '', 
                html: '<div class="custom-pin '+ pinClass +'"><i></i></div>', 
                iconSize: [30, 42],
                iconAnchor: [15, 42], 
                popupAnchor: [0, -35]
            });

            const safeType = document.createTextNode(incident.type).textContent;
            const safeAddress = document.createTextNode(incident.address).textContent;

            L.marker([incident.latitude, incident.longitude], { icon: customIcon })
             .addTo(map)
             .bindPopup(
                '<div style="text-align:center;">' +
                    '<strong style="color:var(--primaryColor); text-transform:uppercase;">'+ safeType +'</strong>' +
                    '<br><span style="font-size:0.8em; color:#666;">'+ dateStr +'</span>' +
                    '<br><div style="margin-top:5px; font-size:0.85em;">'+ safeAddress +'</div>' +
                '</div>'
             );
        });
    } 

    const typeColors = {
        'Fire': '#EF4444', 'Assault': '#991B1B', 'Accident': '#F59E0B',
        'Theft': '#8B5CF6', 'Flooding': '#3B82F6', 'Harassment': '#EC4899', 
        'Suspicious': '#6366F1', 'Other': '#9CA3AF', 'Road Damage': '#4B5563',
        'Waste Management': '#0891B2'
    };

    function loadPieChart(incidents) {
        const chartData = [['Incident Type', 'Count']];
        const typeCounts = {};
        
        incidents.forEach(function(incident) {
            const type = incident.type;
            if (typeCounts[type]) {
                typeCounts[type]++;
            } else {
                typeCounts[type] = 1;
            }
        });
        
        for (const key in typeCounts) {
            chartData.push([key, typeCounts[key]]);
        }
        var formatter = new Intl.NumberFormat('en-US');
        drawPieChart(chartData, formatter.format(incidents.length));
    }

    function drawPieChart(chartDataArray, totalpie) {
        var data = google.visualization.arrayToDataTable(chartDataArray);
        var options = {
            title: 'Incidents by Type ' + (typeof loctitle !== 'undefined'?loctitle:'') + " (" + totalpie + " Reports) ",
            pieHole: 0.2,
            slices: {},
            tooltip: { isHtml: true },
            chartArea: { width: '90%', height: '90%' },
            legend: { position: 'right' },
            backgroundColor: 'transparent'
        };
        
        for (var i = 1; i < chartDataArray.length; i++) {
            var typeName = chartDataArray[i][0]; 
            if (typeColors[typeName]) {
                options.slices[i-1] = { color: typeColors[typeName] };
            }
        }
        var chart = new google.visualization.PieChart(document.getElementById('piechart'));
        chart.draw(data, options);
    }

    function loadReportCards(incidents) {  
        const container = document.querySelector('.reports-container');
        container.innerHTML = ''; 
        const fragment = document.createDocumentFragment();
        
        incidents.forEach(function(incident) {
            const dateincident = prettyDateTimeManual(incident.occurredAt);
            const badgeClass = 'type-' + incident.type.split(" ")[0].toLowerCase();
            
            const cardDiv = document.createElement('div');
            cardDiv.className = 'report-card status' + incident.status.toLowerCase() + ' month' + dateincident.toLowerCase().substring(0,3);
            cardDiv.id = "incidentid" + incident.incidentID;
            
            // Image
            const imgDiv = document.createElement('div');
            imgDiv.className = 'card-image';
            const img = document.createElement('img');
            img.loading = 'lazy';
            img.alt = 'Incident';
            img.src = incident.photo;
            img.onerror = function() { this.src='https://placehold.co/600x400/eeeeee/999999?text=No+Image'; };
            const badge = document.createElement('span');
            badge.className = 'badge ' + badgeClass;
            badge.textContent = incident.type;
            imgDiv.appendChild(img);
            imgDiv.appendChild(badge);

            // Content
            const contentDiv = document.createElement('div');
            contentDiv.className = 'card-content';
            
            // Meta
            const metaDiv = document.createElement('div');
            metaDiv.className = 'meta-header';
            const idSpan = document.createElement('span');
            idSpan.className = 'incident-id';
            idSpan.textContent = 'Incident ID: #' + incident.incidentID;
            const dateSpan = document.createElement('span');
            dateSpan.className = 'incident-date';
            dateSpan.textContent = dateincident;
            metaDiv.appendChild(idSpan);
            metaDiv.appendChild(dateSpan);

            // Location
            const locBox = document.createElement('div');
            locBox.className = 'location-box';
            const locIcon = document.createElement('span');
            locIcon.className = 'loc-icon';
            locIcon.textContent = '📍';
            const locText = document.createElement('div');
            locText.className = 'loc-text';
            const addrDiv = document.createElement('div');
            addrDiv.className = 'address';
            addrDiv.textContent = incident.address;
            const coordDiv = document.createElement('div');
            coordDiv.className = 'coords';
            coordDiv.textContent = incident.latitude + ', ' + incident.longitude;
            locText.appendChild(addrDiv);
            locText.appendChild(coordDiv);
            locBox.appendChild(locIcon);
            locBox.appendChild(locText);

            // Desc
            const descP = document.createElement('p');
            descP.className = 'description';
            descP.textContent = incident.description;

            // Reporter
            const reportInfo = document.createElement('div');
            reportInfo.className = 'reporter-info';
            const profileImg = document.createElement('img');
            profileImg.className = 'avatar';
            profileImg.loading = 'lazy';
            profileImg.src = incident.profilePhoto;
            profileImg.onerror = function() { this.src='https://placehold.co/40x40/4f46e5/ffffff?text=' + incident.userID; };
            const nameSpan = document.createElement('span');
            nameSpan.className = 'reporter-name';
            nameSpan.innerHTML = 'Reported by <strong>' + document.createTextNode(incident.firstName).textContent + '</strong>';

            reportInfo.appendChild(profileImg);
            reportInfo.appendChild(nameSpan);

            const delBtn = document.createElement('button');
            delBtn.className = 'deletereport';
            delBtn.textContent = (incident.status.toLowerCase() === 'deleted') ? 'DELETED INCIDENT' : 'Delete Incident';
            delBtn.onclick = function() { deleteincident("incidentid" + incident.incidentID); };

            contentDiv.appendChild(metaDiv);
            contentDiv.appendChild(locBox);
            contentDiv.appendChild(descP);
            contentDiv.appendChild(reportInfo);
            contentDiv.appendChild(delBtn);

            cardDiv.appendChild(imgDiv);
            cardDiv.appendChild(contentDiv);
            fragment.appendChild(cardDiv);
        });

        container.appendChild(fragment); 
    }

    function toggle(id,display){
        var element = document.getElementById(id);
        if(element.style.display === display){
            element.style.display = 'none';
        }
        else{element.style.display = display;}
    }

    function prettyDateTimeManual(timestamp,withtime) {
        const date = safeDate(timestamp); // SAFE
        const datePart = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        const timePart = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        if (withtime) return datePart + " " + timePart; 
        return datePart;
    }

    function getDynamicDates() {
        const now = new Date();
        const formatDate = function(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return year + '-' + month + '-' + day;
        };

        const todayStart = new Date(now);
        const todayEnd = new Date(now);
        todayEnd.setDate(todayEnd.getDate() + 1);

        const dayOfWeek = now.getDay(); 
        const thisWeekStart = new Date(now);
        thisWeekStart.setDate(now.getDate() - dayOfWeek); 
        
        const thisWeekEnd = new Date(thisWeekStart);
        thisWeekEnd.setDate(thisWeekStart.getDate() + 7); 
        const lastWeekStart = new Date(thisWeekStart);
        lastWeekStart.setDate(thisWeekStart.getDate() - 7);
        const lastWeekEnd = new Date(thisWeekStart); 

        const thisMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        const thisMonthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        const lastMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);
        const lastMonthEnd = new Date(now.getFullYear(), now.getMonth(), 1);
        const thisYearStart = new Date(now.getFullYear(), 0, 1);
        const thisYearEnd = new Date(now.getFullYear() + 1, 0, 1);
        const lastYearStart = new Date(now.getFullYear() - 1, 0, 1);
        const lastYearEnd = new Date(now.getFullYear(), 0, 1);

        return {
            "today":      "start_time=" + formatDate(todayStart) + "&end_time=" + formatDate(todayEnd),
            "thisweek":   "start_time=" + formatDate(thisWeekStart) + "&end_time=" + formatDate(thisWeekEnd),
            "lastweek":   "start_time=" + formatDate(lastWeekStart) + "&end_time=" + formatDate(lastWeekEnd),
            "thismonth":  "start_time=" + formatDate(thisMonthStart) + "&end_time=" + formatDate(thisMonthEnd),
            "lastmonth":  "start_time=" + formatDate(lastMonthStart) + "&end_time=" + formatDate(lastMonthEnd),
            "thisyear":   "start_time=" + formatDate(thisYearStart) + "&end_time=" + formatDate(thisYearEnd),
            "lastyear":   "start_time=" + formatDate(lastYearStart) + "&end_time=" + formatDate(lastYearEnd)
        };
    }

    function addOneDay(dateStr) {
        const parts = dateStr.split('-');
        const date = new Date(parts[0], parts[1] - 1, parts[2]);
        date.setDate(date.getDate() + 1);
        const newYear = date.getFullYear();
        const newMonth = String(date.getMonth() + 1).padStart(2, '0');
        const newDay = String(date.getDate()).padStart(2, '0');
        return newYear + '-' + newMonth + '-' + newDay;
    }

    var argsdate = getDynamicDates();
    const baseUrl = '../api/getincidents.php';
    const params = new URLSearchParams({ show: 'true' });

    if (startDateVal && endDateVal) {
        params.set('start_time', startDateVal);
        params.set('end_time', addOneDay(endDateVal)); 
    } 
    else if (dateRangeVal === 'alltime') { } 
    else if (dateRangeVal && argsdate[dateRangeVal]) {
        const rangeParams = new URLSearchParams(argsdate[dateRangeVal]);
        params.set('start_time', rangeParams.get('start_time'));
        params.set('end_time', rangeParams.get('end_time'));
    } 
    else {
        const defaultParams = new URLSearchParams(argsdate['thisyear']);
        params.set('start_time', defaultParams.get('start_time'));
        params.set('end_time', defaultParams.get('end_time'));
    }

    let loctitle = "";
    if (customLocationVal) {
        params.set('location', customLocationVal);
        loctitle = "(" + customLocationVal.toUpperCase() + ")";
    }

    let title = "(All Types)";
    if (typeVal && typeVal !== "alltype") {
        params.set('type', typeVal);
        title = "(" + typeVal.toUpperCase() + ")";
    }

    const urlapiincident = baseUrl + "?" + params.toString();

    google.charts.load('current', {'packages':['corechart']});
    
    function loadIncidents(url){
        fetch('getincidents.json') 
        .then(function(response) { return response.json(); })
        .then(function(data) {
            var incidents = Array.isArray(data) ? data : data.incidents;
            incidents = incidents.filter(function(incident) { 
                return incident.status && incident.status.toLowerCase() !== 'deleted';
            });

            google.charts.setOnLoadCallback(function() {
                loadLineBarChart(incidents); 
                loadPieChart(incidents);
            });

            loadReportCards(incidents); 
            loadMap(incidents);

            if(incidents.length > 0) {
               chagedatetitle(incidents[incidents.length - 1].occurredAt, incidents[0].occurredAt);
            }
        }) 
        .catch(function(error) {
            console.error(error);
            document.getElementById('chart-date-label').innerText = "No Data Found";
        })
        .finally(function() {
            setTimeout(function() {
                var preloader = document.getElementById('preloader');
                preloader.classList.add('loaded');
            }, 1000);
        });
    }

    function chagedatetitle(firstdate, lastdate){
        document.getElementById('chart-date-label').innerHTML = prettyDateTimeManual(firstdate) + " to " + prettyDateTimeManual(lastdate);
    }

    function scrolltoelement(classname){
       var elements = document.querySelectorAll('.'+ classname);
       if(elements.length > 0){
           elements[0].scrollIntoView({ behavior: 'smooth', block: 'end' });
           elements.forEach(function(element) {
              element.classList.remove('highlight-anim');
              void element.offsetWidth; 
              element.classList.add('highlight-anim');
           });
       }
    }

    loadIncidents(urlapiincident); 

    const myButton = document.getElementById("scrollToTopBtn");
    window.onscroll = function() { scrollFunction(); };

    function scrollFunction() {
      if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) {
        myButton.classList.add("showBtn");
      } else {
        myButton.classList.remove("showBtn");
      }
    }

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>
